<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b388ff"/>
      <stop offset="100%" style="stop-color:#ff6f61"/>
    </linearGradient>
  </defs>
  <!-- Bottle body -->
  <rect x="25" y="35" width="50" height="55" rx="8" fill="url(#grad)" opacity="0.9"/>
  <!-- Neck -->
  <rect x="38" y="20" width="24" height="18" rx="3" fill="#7c4dff"/>
  <!-- Cap -->
  <rect x="36" y="14" width="28" height="8" rx="4" fill="#b388ff"/>
  <!-- Liquid level -->
  <rect x="28" y="55" width="44" height="8" rx="4" fill="rgba(255,255,255,0.3)"/>
  <!-- Spray nozzle -->
  <rect x="46" y="10" width="8" height="6" rx="2" fill="#8888aa"/>
</svg>
